<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Content Security Policy -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' blob: data: https:;
      connect-src 'self' blob: https: ws: wss:;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    "
    />

    <!-- Security headers via meta -->
    <!-- frame-ancestors and X-Frame-Options must be set as HTTP headers on your hosting provider/server -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Restore saved theme before React renders to prevent flash -->
    <script src="/theme-init.js"></script>
    <link rel="icon" href="/logo.png" type="image/png" />

    <title>MemoHub</title>
    <meta
      name="description"
      content="Secure internal memo and messaging platform for teams"
    />
    <meta name="author" content="MemoHub" />

    <meta property="og:title" content="MemoHub" />
    <meta
      property="og:description"
      content="Secure internal memo and messaging platform for teams"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/logo.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
